name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t rarestomuta/shopping-app:${{ steps.vars.outputs.IMAGE_TAG }} .

      - name: Push Docker Image
        run: |
          docker push rarestomuta/shopping-app:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: Tomuta-Rares/Infra-repo
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update Image in Deployment YAML
        run: |
          sed -i "s|image: rarestomuta/shopping-app:.*|image: rarestomuta/shopping-app:${{ steps.vars.outputs.IMAGE_TAG }}|g" infra/shopping-app-deployment.yaml

      - name: Commit and Push Changes
        run: |
          cd infra
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update shopping-app image to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
