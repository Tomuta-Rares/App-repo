name: App CI

on:
  push:

jobs:
  fast-validation:
    name: Fast Validation

    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python runtime
        run: |
          python --version
          pip --version

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify application dependencies
        run: |
          python -c "import fastapi; print(f'FastAPI: {fastapi.__version__}')"
          python -c "import sqlalchemy; print(f'SQLAlchemy: {sqlalchemy.__version__}')"

      - name: Verify development tools
        run: |
          ruff --version
          pytest --version
          coverage --version

      - name: Validate Python syntax
        run: |
          python -m compileall .

      - name: Check Python formatting
        run: |
          ruff format --check .

      - name: Run lint
        run: |
          ruff check .

      - name: Run tests with coverage
        run: |
          mkdir -p test-results coverage
          python -m pytest \
            --cov=main \
            --cov=auth \
            --cov-report=term-missing \
            --cov-report=xml:coverage/coverage.xml \
            --junitxml=test-results/junit.xml

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-validation-reports
          path: |
            test-results/
            coverage/
          if-no-files-found: warn

  build:
    name: Build Container Images
    needs: fast-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Verify Docker runtime
        run: |
          docker version
          docker buildx version

      - name: Build backend image
        run: |
          docker build \
            --tag shopping-backend:ci \
            .

      - name: Build frontend image
        run: |
          docker build \
            --tag shopping-frontend:ci \
            ./frontend

      - name: Verify built images
        run: |
          docker image inspect shopping-backend:ci
          docker image inspect shopping-frontend:ci


      - name: Start backend container
        run: |
          docker run -d \
            --name shopping-backend-ci \
            -p 8000:8000 \
            -e DATABASE_URL="sqlite:///./ci-test.db" \
            -e KEYCLOAK_ISSUER="https://auth.test/realms/devops-lvlup" \
            -e KEYCLOAK_JWKS_URL="https://auth.test/realms/devops-lvlup/protocol/openid-connect/certs" \
            shopping-backend:ci

      - name: Wait for backend readiness
        run: |
          for attempt in {1..15}; do
            if curl --fail --silent http://localhost:8000/api/health; then
              echo
              echo "Backend is ready."
              exit 0
            fi

            echo "Attempt ${attempt}/15: backend is not ready yet."
            sleep 2
          done

          echo "Backend did not become ready."
          exit 1
    
      - name: Start frontend container
        run: |
          docker run -d \
            --name shopping-frontend-ci \
            -p 8080:80 \
            shopping-frontend:ci

      - name: Verify frontend response
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent http://localhost:8080/ > /dev/null; then
              echo "Frontend is ready."
              exit 0
            fi

            echo "Attempt ${attempt}/10: frontend is not ready yet."
            sleep 2
          done

          echo "Frontend did not become ready."
          exit 1

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p container-logs

          docker logs shopping-backend-ci \
            > container-logs/backend.log 2>&1 || true

          docker logs shopping-frontend-ci \
            > container-logs/frontend.log 2>&1 || true

      - name: Upload container test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-startup-reports
          path: container-logs/
          if-no-files-found: warn

      - name: Stop test containers
        if: always()
        run: |
          docker rm -f shopping-backend-ci || true
          docker rm -f shopping-frontend-ci || true

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: "v0.72.0"
      
      - name: Verify Trivy runtime
        run: |
          trivy --version

      - name: Scan backend image
        run: |
          mkdir -p security-reports

          trivy image \
            --severity HIGH,CRITICAL \
            --format table \
            --output security-reports/backend-trivy.txt \
            shopping-backend:ci

      - name: Scan frontend image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format table \
            --output security-reports/frontend-trivy.txt \
            shopping-frontend:ci

      - name: Enforce critical vulnerability gate
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            shopping-backend:ci

          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            shopping-frontend:ci

      - name: Display security scan summary
        if: always()
        run: |
          echo "===== Backend image scan ====="
          cat security-reports/backend-trivy.txt || true

          echo
          echo "===== Frontend image scan ====="
          cat security-reports/frontend-trivy.txt || true

      - name: Upload security scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Export validated container images
        run: |
          mkdir -p image-artifacts

          docker save \
            shopping-backend:ci \
            shopping-frontend:ci \
            | gzip > image-artifacts/container-images.tar.gz

      - name: Verify exported image artifact
        run: |
          ls -lh image-artifacts/container-images.tar.gz
          gzip --test image-artifacts/container-images.tar.gz

      - name: Upload validated container images
        uses: actions/upload-artifact@v4
        with:
          name: validated-container-images
          path: image-artifacts/container-images.tar.gz
          if-no-files-found: error
          retention-days: 1

  push-images:
    name: Push Container Images
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/shopping-backend
      FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/shopping-frontend

    steps:
      - name: Download validated container images
        uses: actions/download-artifact@v4
        with:
          name: validated-container-images
          path: image-artifacts

      - name: Verify downloaded artifact
        run: |
          ls -lh image-artifacts/container-images.tar.gz
          gzip --test image-artifacts/container-images.tar.gz

      - name: Load validated container images
        run: |
          gunzip --stdout image-artifacts/container-images.tar.gz \
            | docker load

      - name: Verify loaded images
        run: |
          docker image inspect shopping-backend:ci
          docker image inspect shopping-frontend:ci

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag validated images
        run: |
          docker tag \
            shopping-backend:ci \
            "${BACKEND_IMAGE}:${GITHUB_SHA}"

          docker tag \
            shopping-frontend:ci \
            "${FRONTEND_IMAGE}:${GITHUB_SHA}"

      - name: Push validated images
        run: |
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"

      - name: Verify published images
        run: |
          docker buildx imagetools inspect \
            "${BACKEND_IMAGE}:${GITHUB_SHA}"

          docker buildx imagetools inspect \
            "${FRONTEND_IMAGE}:${GITHUB_SHA}"

  commit-back:
    name: Update Infra Repository
    needs: push-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Tomuta-Rares/Infra-repo
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Verify infrastructure repository
        run: |
          git -C infra-repo remote -v
          test -f infra-repo/helm-charts/shopping-stack/charts/shopping-app/values.yaml

      - name: Install yq
        run: |
          sudo wget \
            --output-document=/usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.47.1/yq_linux_amd64

          sudo chmod +x /usr/local/bin/yq

      - name: Verify yq
        run: |
          yq --version

      - name: Update image tags
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          VALUES_FILE="infra-repo/helm-charts/shopping-stack/charts/shopping-app/values.yaml"

          yq -i '.image.tag = strenv(IMAGE_TAG)' "${VALUES_FILE}"
          yq -i '.frontend.image.tag = strenv(IMAGE_TAG)' "${VALUES_FILE}"

      - name: Verify desired state update
        run: |
          VALUES_FILE="infra-repo/helm-charts/shopping-stack/charts/shopping-app/values.yaml"

          echo "Backend image:"
          yq '.image.repository + ":" + .image.tag' "${VALUES_FILE}"

          echo "Frontend image:"
          yq '.frontend.image.repository + ":" + .frontend.image.tag' "${VALUES_FILE}"

          git -C infra-repo diff -- "${VALUES_FILE#infra-repo/}"

      - name: Commit and push desired state
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd infra-repo

          if git diff --quiet; then
            echo "Infrastructure repository already uses image tag ${IMAGE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm-charts/shopping-stack/charts/shopping-app/values.yaml

          git commit \
            -m "chore(deploy): update shopping images to ${IMAGE_TAG}"

          git push

