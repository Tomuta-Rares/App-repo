name: App CI

on:
  push:

jobs:
  fast-validation:
    name: Fast Validation

    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python runtime
        run: |
          python --version
          pip --version

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify application dependencies
        run: |
          python -c "import fastapi; print(f'FastAPI: {fastapi.__version__}')"
          python -c "import sqlalchemy; print(f'SQLAlchemy: {sqlalchemy.__version__}')"

      - name: Verify development tools
        run: |
          ruff --version
          pytest --version
          coverage --version

      - name: Validate Python syntax
        run: |
          python -m compileall .

      - name: Check Python formatting
        run: |
          ruff format --check .

      - name: Run lint
        run: |
          ruff check .

      - name: Run tests with coverage
        run: |
          mkdir -p test-results coverage
          python -m pytest \
            --cov=main \
            --cov=auth \
            --cov-report=term-missing \
            --cov-report=xml:coverage/coverage.xml \
            --junitxml=test-results/junit.xml

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-validation-reports
          path: |
            test-results/
            coverage/
          if-no-files-found: warn

  build:
    name: Build Container Images
    needs: fast-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Verify Docker runtime
        run: |
          docker version
          docker buildx version

      - name: Build backend image
        run: |
          docker build \
            --tag shopping-backend:ci \
            .

      - name: Build frontend image
        run: |
          docker build \
            --tag shopping-frontend:ci \
            ./frontend

      - name: Verify built images
        run: |
          docker image inspect shopping-backend:ci
          docker image inspect shopping-frontend:ci

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: "v0.72.0"
      
      - name: Verify Trivy runtime
        run: |
          trivy --version

      - name: Scan backend image
        run: |
          mkdir -p security-reports

          trivy image \
            --severity HIGH,CRITICAL \
            --format table \
            --output security-reports/backend-trivy.txt \
            shopping-backend:ci

      - name: Scan frontend image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format table \
            --output security-reports/frontend-trivy.txt \
            shopping-frontend:ci

      - name: Display security scan summary
        if: always()
        run: |
          echo "===== Backend image scan ====="
          cat security-reports/backend-trivy.txt || true

          echo
          echo "===== Frontend image scan ====="
          cat security-reports/frontend-trivy.txt || true

      - name: Upload security scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Start backend container
        run: |
          docker run -d \
            --name shopping-backend-ci \
            -p 8000:8000 \
            -e DATABASE_URL="sqlite:///./ci-test.db" \
            -e KEYCLOAK_ISSUER="https://auth.test/realms/devops-lvlup" \
            -e KEYCLOAK_JWKS_URL="https://auth.test/realms/devops-lvlup/protocol/openid-connect/certs" \
            shopping-backend:ci

      - name: Wait for backend readiness
        run: |
          for attempt in {1..15}; do
            if curl --fail --silent http://localhost:8000/api/health; then
              echo
              echo "Backend is ready."
              exit 0
            fi

            echo "Attempt ${attempt}/15: backend is not ready yet."
            sleep 2
          done

          echo "Backend did not become ready."
          exit 1
    
      - name: Start frontend container
        run: |
          docker run -d \
            --name shopping-frontend-ci \
            -p 8080:80 \
            shopping-frontend:ci

      - name: Verify frontend response
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent http://localhost:8080/ > /dev/null; then
              echo "Frontend is ready."
              exit 0
            fi

            echo "Attempt ${attempt}/10: frontend is not ready yet."
            sleep 2
          done

          echo "Frontend did not become ready."
          exit 1

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p container-logs

          docker logs shopping-backend-ci \
            > container-logs/backend.log 2>&1 || true

          docker logs shopping-frontend-ci \
            > container-logs/frontend.log 2>&1 || true

      - name: Upload container test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-startup-reports
          path: container-logs/
          if-no-files-found: warn

      - name: Stop test containers
        if: always()
        run: |
          docker rm -f shopping-backend-ci || true
          docker rm -f shopping-frontend-ci || true